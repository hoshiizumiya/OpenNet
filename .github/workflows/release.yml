name: Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Release]
      fail-fast: false

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'
          runVcpkgInstall: false

      - name: Restore NuGet packages
        run: nuget restore OpenNet.sln

      - name: Install vcpkg dependencies
        run: |
          $triplet = if ("${{ matrix.platform }}" -eq "ARM64") { "arm64-windows" } else { "x64-windows" }
          cd OpenNet
          ${{ github.workspace }}/vcpkg/vcpkg install --triplet $triplet
        shell: pwsh

      - name: Build solution
        run: |
          msbuild OpenNet.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:AppxBundlePlatforms="${{ matrix.platform }}" /p:AppxPackageSigningEnabled=false /p:UapAppxPackageBuildMode=SideloadOnly /m
        shell: pwsh

      - name: Create release package
        run: |
          $outputDir = "OpenNet/${{ matrix.platform }}/${{ matrix.configuration }}"
          $packageName = "OpenNet_${{ matrix.platform }}"
          
          # Create a clean directory for release files
          New-Item -ItemType Directory -Force -Path "release-${{ matrix.platform }}"
          
          # Copy AppX packages if they exist
          if (Test-Path "$outputDir/AppX") {
            Copy-Item -Path "$outputDir/AppX/*" -Destination "release-${{ matrix.platform }}/" -Recurse
          }
          
          # Also copy loose files (exe, dll, etc.) if AppX doesn't exist
          if (Test-Path "$outputDir/OpenNet.exe") {
            Get-ChildItem -Path $outputDir -Include *.exe,*.dll,*.pri,*.winmd -Recurse | 
              Where-Object { $_.FullName -notlike "*vcpkg_installed*" } |
              Copy-Item -Destination "release-${{ matrix.platform }}/" -Force
          }
          
          # Create zip archive
          Compress-Archive -Path "release-${{ matrix.platform }}/*" -DestinationPath "${packageName}.zip" -Force
        shell: pwsh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenNet_${{ matrix.platform }}
          path: OpenNet_${{ matrix.platform }}.zip
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenNet_x64
          path: ./artifacts

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenNet_ARM64
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/OpenNet_x64.zip
            ./artifacts/OpenNet_ARM64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
