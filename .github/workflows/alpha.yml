name: Alpha

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, default alpha-<short_sha>
        required: false
        type: string
      source_sha:
        description: Commit SHA to match Canary build, default current SHA
        required: false
        type: string
  push:
    tags:
      - "alpha/*"

permissions:
  actions: read
  contents: write

concurrency:
  group: alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve_canary:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.pick.outputs.run_id }}
      artifact_name: ${{ steps.pick.outputs.artifact_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      source_sha: ${{ steps.meta.outputs.source_sha }}

    steps:
      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.source_sha }}" ]; then
            source_sha="${{ github.event.inputs.source_sha }}"
          else
            source_sha="${GITHUB_SHA}"
          fi

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="alpha-${source_sha:0:7}"
          fi

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Alpha $tag" >> "$GITHUB_OUTPUT"

      - name: Find successful Canary run by SHA
        id: pick
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourceSha = "${{ steps.meta.outputs.source_sha }}";

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: "canary.yml",
              per_page: 100,
              event: "push",
              branch: "develop"
            });

            const matched = runs.find(r => r.head_sha === sourceSha && r.conclusion === "success");
            if (!matched) {
              core.setFailed(`No successful Canary run found for SHA ${sourceSha}`);
              return;
            }

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: matched.id,
              per_page: 100
            });

            const artifact = artifacts.find(a => a.name.startsWith("OpenNet.Canary_") && !a.expired);
            if (!artifact) {
              core.setFailed(`No available OpenNet.Canary_* artifact in run ${matched.id}`);
              return;
            }

            core.setOutput("run_id", String(matched.id));
            core.setOutput("artifact_name", artifact.name);

  prerelease:
    needs: resolve_canary
    runs-on: ubuntu-latest
    steps:
      - name: Download Canary artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: canary.yml
          run_id: ${{ needs.resolve_canary.outputs.run_id }}
          name: ${{ needs.resolve_canary.outputs.artifact_name }}
          path: out
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish or update Alpha prerelease
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve_canary.outputs.release_tag }}
          name: ${{ needs.resolve_canary.outputs.release_name }}
          prerelease: true
          allowUpdates: true
          updateOnlyUnreleased: true
          replacesArtifacts: true
          artifacts: out/*.7z
          generateReleaseNotes: true
          body: |
            Auto-published from Canary artifact.
            Source SHA: ${{ needs.resolve_canary.outputs.source_sha }}
            Canary Run ID: ${{ needs.resolve_canary.outputs.run_id }}

      - name: Add summary
        shell: bash
        run: |
          {
            echo "## Alpha publish summary"
            echo "- Source SHA: ${{ needs.resolve_canary.outputs.source_sha }}"
            echo "- Canary Run ID: ${{ needs.resolve_canary.outputs.run_id }}"
            echo "- Artifact: ${{ needs.resolve_canary.outputs.artifact_name }}"
            echo "- Release tag: ${{ needs.resolve_canary.outputs.release_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"